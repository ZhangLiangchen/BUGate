bugate:
  version: 0.1
  mode: core

# Memory-bus namespace/tag. The simple BUGate YAML parser flattens nested keys,
# so `namespace` is read at the top level here. Override per project with the
# env var MEMORY_BUS_PROJECT_TAG or by changing this value.
memory:
  namespace: project:bugate

# SUT profiles should override these values outside the BUGate core.
artifact_dir:
guarded_path_regex: []
required_precode_artifacts:
  - 01_business_brief.md
  - 02_testability.md
  - 03_inventory.yaml
  - 03a_test_cases.md
  - 03b_adversarial_cases.yaml
