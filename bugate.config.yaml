bugate:
  version: 0.1
  mode: core

# Memory-bus namespace/tag. The simple BUGate YAML parser flattens nested keys,
# so `namespace` is read at the top level here. Override per project with the
# env var MEMORY_BUS_PROJECT_TAG or by changing this value.
memory:
  namespace: project:bugate

# SUT profiles should override these values outside the BUGate core.
artifact_dir:
guarded_path_regex: []

# Wave 8 oracle falsification (default unmounted → oracle_falsification.py reports
# profile_required). A SUT profile points at a declarative oracle/mutation spec and
# an optional score threshold (0-1). See references/profile-schema.md and the worked
# spec at examples/demo-sut/falsification_spec.yaml.
#   falsification_spec: sut/example/falsification_spec.yaml
#   falsification_threshold: 0.7

# Wave 0 PRD health check (default unmounted → check_prd_health.py reports
# profile_required). Point at a declarative 8-dimension self-assessment; the
# engine scores 0-100 + grade A-D. See examples/demo-sut/prd_health.yaml.
#   prd_health_spec: sut/example/prd_health.yaml
#   prd_health_min: 60

# Optional Layer-1/Layer-4 hardening gates (off by default):
#   verifiability_min: 0.8                 # Layer 1 verifiability-ratio floor
#   artifact_dir_template: docs/usecases/{uc}/   # per-UC fail-closed write binding
required_precode_artifacts:
  - 01_business_brief.md
  - 02_testability.md
  - 03_inventory.yaml
  - 03a_test_cases.md
  - 03b_adversarial_cases.yaml
