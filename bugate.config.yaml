bugate:
  version: 0.1
  mode: core

# Memory-bus namespace/tag. Config documents are parsed as nested mappings and
# deep-merged; `memory.namespace` is canonical. Legacy profiles that still use a
# top-level `namespace` remain compatible. MEMORY_BUS_PROJECT_TAG overrides both.
memory:
  namespace: project:bugate

# SUT profiles should override these values outside the BUGate core.
artifact_dir:
guarded_path_regex: []

# Auditable Wave 7 lifecycle governance is opt-in. Imported SUT profiles may
# select advisory/required and provide the full phase contract; Core stays inert.
role_governance:
  mode: off

# Wave 8 oracle falsification (default unmounted → oracle_falsification.py reports
# profile_required). A SUT profile points at a declarative oracle/mutation spec and
# an optional score threshold (0-1). Spec shape: references/profile-schema.md.
#   falsification_spec: sut/example/falsification_spec.yaml
#   falsification_threshold: 0.7

# Wave 0 PRD health check (default unmounted → check_prd_health.py reports
# profile_required). Point at a declarative 8-dimension self-assessment; the
# engine scores 0-100 + grade A-D. Spec shape: references/profile-schema.md.
#   prd_health_spec: sut/example/prd_health.yaml
#   prd_health_min: 60

# Optional hardening gates (off by default):
#   verifiability_min: 0.8                 # Layer 1 verifiability-ratio floor
#   artifact_dir_template: docs/usecases/{uc}/   # per-UC fail-closed write binding
#   require_multiview: true                # require Wave 1 00_multiview/divergence_report.md per UC
#   require_adversarial_absorption: true   # require >=1 Stage 3B-absorbed inventory case per UC
#   require_regression_traceability: true  # 04/05 must carry a Regression Cases section
#   layer2_strict: true                    # Layer 2 evidence status + dependency/deferred sections
#   require_assertion_coverage: true       # 0 missing_implementation oracles in the coverage matrix
#   require_real_adversarial_dispatch: true # 03b must come from real peer dispatch
#   reject_on_bridge_failures: true        # archived schema-rejected peer views block the gate
required_precode_artifacts:
  - 01_business_brief.md
  - 02_testability.md
  - 03_inventory.yaml
  - 03a_test_cases.md
  - 03b_adversarial_cases.yaml
