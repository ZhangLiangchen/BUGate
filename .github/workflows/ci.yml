name: CI

on:
  push:
  pull_request:

jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Compile all gate scripts
        run: python3 -m py_compile scripts/*.py

      - name: Brief semantics gate
        run: python3 scripts/check_bugate_brief_semantics.py .shared/skills/bugate/templates

      - name: Layer-2 semantics gate
        run: python3 scripts/check_bugate_layer2_semantics.py .shared/skills/bugate/templates

      - name: Inventory semantics gate
        run: python3 scripts/check_bugate_inventory_semantics.py .shared/skills/bugate/templates

      - name: V13 pre-code semantics gate
        run: python3 scripts/check_bugate_v13_semantics.py .shared/skills/bugate/templates --scope pre-code

      # De-SUT guard (CHARTER A1: block seepage, not mention) — four readings:
      # built-in hygiene, the origin SUT's legacy terms can never seep back,
      # a second SUT's profile-declared identity stays out of the kit tree,
      # and the meta-test proves every red/green verdict with negative controls.
      - name: De-SUT guard — general hygiene (kit tree, no term list)
        run: python3 scripts/check_no_sut_terms.py

      - name: De-SUT guard — legacy origin-SUT regression (fixture terms)
        run: python3 scripts/check_no_sut_terms.py --terms-file tests/fixtures/legacy-sut-terms.txt

      - name: De-SUT guard — second-SUT identity defense (imported-demo profile)
        run: cd examples/imported-demo && python3 ../../scripts/check_no_sut_terms.py

      - name: De-SUT guard — exemption + seepage negative controls (meta-test)
        run: python3 tests/test_desut_guard.py

      - name: Worked demo passes the strict gate
        run: python3 scripts/check_bugate_v13_semantics.py examples/demo-sut --scope all --require-passed

      - name: Per-UC hardening gates ON (multiview + adversarial absorption, demo)
        run: BUGATE_PROFILE=examples/sample-sut.profile.yaml python3 scripts/check_bugate_v13_semantics.py examples/demo-sut --scope all --require-passed

      - name: Write-guard dual-layout acceptance (imported default + workbench)
        run: |
          # Imported layout: the governed repo is the workspace root (committed
          # config marks it); the engine resolves from its own location.
          cd examples/imported-demo
          python3 ../../scripts/check_bugate.py tests/link/test_redirect.py </dev/null
          if python3 ../../scripts/check_bugate.py tests/new/test_new.py </dev/null; then
            echo "negative control failed: pending UC was not blocked (imported)"; exit 1
          fi
          cd ../..
          # Workbench layout: the engine repo is the workspace root, the SUT
          # tree is mounted beneath it and bound via a local profile.
          export BUGATE_PROFILE=examples/mounted-demo/demo.profile.yaml
          python3 scripts/check_bugate.py examples/mounted-demo/tests/link/test_redirect.py </dev/null
          if python3 scripts/check_bugate.py examples/mounted-demo/tests/new/test_new.py </dev/null; then
            echo "negative control failed: pending UC was not blocked (workbench)"; exit 1
          fi

      - name: Wave 0 PRD health gate (demo)
        run: python3 scripts/check_prd_health.py --input examples/demo-sut/prd_health.yaml --json-output /tmp/h.json --md-output /tmp/h.md --gate

      - name: Wave 8 falsification gate + coverage matrix (demo)
        run: |
          python3 scripts/oracle_falsification.py --spec examples/demo-sut/falsification_spec.yaml \
            --json-output /tmp/of.json --md-output /tmp/of.md --gate
          python3 scripts/generate_assertion_coverage_matrix.py --artifact-root examples/demo-sut \
            --spec examples/demo-sut/falsification_spec.yaml --mutation-result /tmp/of.json --output /tmp/matrix.md \
            --gate --max-missing 1

      - name: Orchestrator init smoke (full SDTD)
        run: |
          tmp="$(mktemp -d)"
          python3 scripts/sdtd_orchestrator.py "$tmp" --init --full-sdtd
          python3 scripts/check_bugate_v13_semantics.py "$tmp" --scope pre-code
          rm -rf "$tmp"

      - name: Core stays stdlib-only
        run: |
          python3 - <<'PY'
          import ast, sys, pathlib
          repo_mods = {p.stem for p in pathlib.Path("scripts").glob("*.py")}
          allowed = set(sys.stdlib_module_names) | repo_mods
          bad = []
          for p in sorted(pathlib.Path("scripts").glob("*.py")):
              tree = ast.parse(p.read_text(encoding="utf-8"))
              for node in ast.walk(tree):
                  if isinstance(node, ast.Import):
                      for a in node.names:
                          if a.name.split(".")[0] not in allowed:
                              bad.append(f"{p.name}: import {a.name}")
                  elif isinstance(node, ast.ImportFrom) and node.level == 0 and node.module:
                      if node.module.split(".")[0] not in allowed:
                          bad.append(f"{p.name}: from {node.module}")
          if bad:
              print("Third-party imports found in core:")
              for b in bad:
                  print(" ", b)
              sys.exit(1)
          print("Core is stdlib-only: OK")
          PY
