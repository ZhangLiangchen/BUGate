# Sample BUGate SUT profile — copy this to sut/<name>.profile.yaml and edit.
#
# A profile is merged on top of bugate.config.yaml by bugate_core.load_config.
# Point BUGate at it via `profile:` in bugate.config.yaml or the BUGATE_PROFILE
# env var. Replace every placeholder path/regex below with the real ones for
# your system under test. See .shared/skills/bugate/references/profile-schema.md
# for the full field reference, and examples/demo-sut/ for a filled gate stack.

# Where this requirement's pre-code BUGate artifacts live (one dir per use case).
artifact_dir: sut/example/bugate/REQ-001

# Implementation paths physically blocked by scripts/check_bugate.py until the
# pre-code artifacts below reach gate_status: passed. Empty list = nothing guarded.
guarded_path_regex:
  - "^sut/example/tests/.*[.]py$"

# Artifact filenames that must reach gate_status: passed before guarded writes.
# Add 01a_domain_model.md / 01b_state_flow.md / 02a_test_dimension_matrix.yaml
# here only if you want the optional Full-SDTD modeling stack to be required.
required_precode_artifacts:
  - 01_business_brief.md
  - 02_testability.md
  - 03_inventory.yaml
  - 03a_test_cases.md
  - 03b_adversarial_cases.yaml

# Agent-role path isolation (consulted by scripts/check_agent_role_paths.py when
# BUGATE_AGENT_ROLE is set). Core ships no roles; the profile supplies them.
agent_roles:
  # Bare list: forbidden for both read and write under this role.
  implementer:
    - "^sut/example/docs/source_mirror/.*$"
  # Split form: scope read and write independently.
  designer:
    read:
      - "^sut/example/internal/.*$"
    write:
      - "^sut/example/tests/.*[.]py$"

# Wave 8 oracle falsification: a declarative oracle/mutation spec + score gate.
# The engine (scripts/oracle_falsification.py) is SUT-neutral; the spec supplies
# the oracles, mutations, and evidence. See examples/demo-sut/falsification_spec.yaml.
falsification_spec: examples/demo-sut/falsification_spec.yaml
falsification_threshold: 0.7

# Wave 0 PRD health self-assessment (scripts/check_prd_health.py, METHOD §3).
prd_health_spec: examples/demo-sut/prd_health.yaml
prd_health_min: 60

# Per-UC hardening gates (opt-in; off in the lean core default).
require_multiview: true               # every UC must ship 00_multiview/divergence_report.md
require_adversarial_absorption: true  # every UC inventory must absorb >= 1 Stage 3B finding
require_regression_traceability: true # 04/05 must carry a Regression Cases section
layer2_strict: true                   # Layer 2 evidence status + dependency/deferred sections
reject_on_bridge_failures: true       # archived schema-rejected peer views block the gate
# Heavier gates available but not enabled here (the demo intentionally violates them):
#   require_assertion_coverage: true       # 0 missing_implementation oracles (demo keeps O-003 as a teaching gap)
#   require_real_adversarial_dispatch: true # 03b must come from real peer dispatch, not a placeholder

# Memory-bus project namespace/tag for all reads/writes (override per project).
memory:
  namespace: project:example-sut
