# Imported-mode SUT profile — COMMITTED in the governed repo (CHARTER §2.2 R2).
#
# Every path below is repo-relative: in imported mode the workspace root IS the
# governed repo (marked by its committed bugate.config.yaml), so the profile
# never reaches outside it. Compare examples/mounted-demo/demo.profile.yaml,
# whose paths carry an examples/mounted-demo/ prefix because in the workbench
# the workspace root is the engine repo and the SUT tree hangs beneath it.

# Per-UC fail-closed binding: each guarded test path resolves to its OWN
# artifact dir via the {uc} template + the (?P<uc>...) capture.
artifact_dir_template: usecases/{uc}/
guarded_path_regex:
  - "(^|/)tests/(?P<uc>[^/]+)/[^/]+[.]py$"

required_precode_artifacts:
  - 01_business_brief.md
  - 02_testability.md
  - 03_inventory.yaml
  - 03a_test_cases.md
  - 03b_adversarial_cases.yaml

memory:
  namespace: project:imported-demo
