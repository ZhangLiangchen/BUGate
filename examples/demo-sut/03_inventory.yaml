gate: layer3_inventory
gate_status: passed
sut_profile: demo-sut (Linkly URL shortener)
cases:
  - id: CASE-001
    intent: Create a short link for a valid URL and verify the stored mapping.
    priority: P0
    proposition_refs:
      - P-001
    oracle_refs:
      - O-001
    layer_decision: api
    preconditions:
      - A running Linkly instance.
    data_source:
      source: a generated unique long URL
      status: ready
    expected_observations:
      - POST /links returns 201 with a 7-character short_code.
      - GET /links/{short_code} returns the original_url.
    implementation_target: profile-owned test for the create-link flow
  - id: CASE-002
    intent: An active short code redirects to its original URL.
    priority: P0
    proposition_refs:
      - P-002
    oracle_refs:
      - O-002
    layer_decision: e2e
    preconditions:
      - An active short link exists.
    data_source:
      source: a short link created in setup
      status: ready
    expected_observations:
      - GET /{short_code} responds 302 with Location equal to the original_url.
    implementation_target: profile-owned test for the redirect flow
  - id: CASE-003
    intent: An expired short code returns 410 and does not redirect.
    priority: P1
    proposition_refs:
      - P-003
    oracle_refs:
      - O-003
    layer_decision: api
    preconditions:
      - An expired short link seeded via fixture.
    data_source:
      source: a fixture that seeds an already-expired link
      status: ready
    expected_observations:
      - GET /{short_code} responds 410 with no Location header.
    implementation_target: profile-owned test for the expiry behavior
coverage_deferred: []
