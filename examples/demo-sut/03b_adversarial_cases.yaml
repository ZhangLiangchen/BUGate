gate: adversarial_cases
gate_status: passed
sut_profile: demo-sut (Linkly URL shortener)
adversarial_cases:
  - id: ADV-001
    risk: A redirect test that follows redirects could mask a wrong status code.
    scenario: GET /{short_code} while following redirects and only checking the final page.
    expected_oracle_pressure: Assert the 302 status and Location header directly, without following.
    disposition: covered
  - id: ADV-002
    risk: An expired link might return 404 instead of the contractual 410.
    scenario: GET /{short_code} on a link that expired one second ago.
    expected_oracle_pressure: Assert the exact 410 status, not merely a non-2xx response.
    disposition: covered
residual_risks:
  - Concurrency on short-code generation is out of scope for this slice.
