adapters:
  brief_gate: brief-gate.md
  testability_gate: testability-gate.md
  inventory_gate: inventory-gate.md
  sdtd_multiview: sdtd-multiview.md
  sdtd_adversarial: sdtd-adversarial.md

sdtd_workflow:
  orchestrator_init: python3 scripts/sdtd_orchestrator.py <artifact_dir> --init
  semantics_check: python3 scripts/check_bugate_v13_semantics.py <artifact_dir> --scope pre-code
  # Post-run self-healing + reports go through the orchestrator, which wires the
  # required --pytest-log/--command/output flags for self_healing_mvp.py and
  # generate_sdtd_reports.py.
  postrun: python3 scripts/sdtd_orchestrator.py <artifact_dir> --auto --scope post-run --pytest-log <pytest.log> --command "<test command>"
  assertion_coverage: python3 scripts/generate_assertion_coverage_matrix.py --artifact-root <artifact_dir> --output <artifact_dir>/assertion_coverage_matrix.md
